name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: study-app-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: study-app-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q
        env:
          DATABASE_URL: postgresql+psycopg://user:password@localhost:5432/study_app
          JWT_SECRET: ci-test-secret-key-minimum-32-chars-long
          GOOGLE_CLIENT_ID: ci-test-client-id
          GOOGLE_CLIENT_SECRET: ci-test-client-secret
          ENVIRONMENT: test

  frontend:
    name: Frontend — type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: study-app-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: study-app-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -p tsconfig.app.json
